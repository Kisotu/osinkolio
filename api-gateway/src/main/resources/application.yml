spring:
  application:
    name: api-gateway
  config:
    import: optional:file:../config/api-gateway.yml

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: http://user-service:8084
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        - id: inventory-service
          uri: http://inventory-service:8086
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=0

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestSize
          args:
            maxSize: 10MB

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"